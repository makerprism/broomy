name: Scroll Stress E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

concurrency:
  group: scroll-stress-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scroll-stress:
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run scroll stress E2E suite
        env:
          CI: true
          E2E_HEADLESS: true
        run: xvfb-run -a pnpm test:scroll-stress
